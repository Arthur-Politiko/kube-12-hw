apiVersion: v1
kind: Service
metadata:
  name: netology-svc
  namespace: test
spec:
  selector:              # какие поды обслуживать
    app: netology-web    # должен совпадать с labels пода
  ports:
    - port: 80           # порт, который слушает Service
      targetPort: 8080   # порт контейнера
      protocol: TCP
  type: ClusterIP        # по умолчанию, можно опустить